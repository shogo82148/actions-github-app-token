AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: credential provider for actions-github-app-token

Parameters:
  ApiUrl:
    Type: String
    Default: https://api.github.com
    Description: The URL for GitHub API. You might need to configure it if you use GitHub Enterprise Server.
  AppId:
    Type: AWS::SSM::Parameter::Name
    Default: /github-app-token/app-id
    Description: A Systems Manager parameter whose value is the app id.
  KmsKeyId:
    Type: String
    Default: alias/github-app
    Description: The KMS key ID used for signing JWTs.

Globals:
  Function:
    Timeout: 5
    PermissionsBoundary: !Sub "arn:aws:iam::${AWS::AccountId}:policy/github-app-token-permissions-boundary-us-east-1"

Resources:
  ProviderFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
    Properties:
      CodeUri: github-app-token/
      Handler: github-app-token
      Runtime: provided.al2023
      Architectures: [arm64]
      Tracing: Active
      Events:
        CatchAll:
          Type: HttpApi
      Environment:
        Variables:
          GITHUB_API_URL: !Ref ApiUrl
          GITHUB_APP_ID: !Ref AppId
          GITHUB_APP_KMS_KEY_ID: !Ref KmsKeyId
      Policies:
        - SSMParameterWithSlashPrefixReadPolicy:
            ParameterName: !Ref AppId
        - arn:aws:iam::aws:policy/AWSXrayWriteOnlyAccess
        - Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Action:
                - kms:Sign
              Resource: !Sub "arn:${AWS::Partition}:kms:${AWS::Region}:${AWS::AccountId}:key/*"
              Condition:
                StringEquals:
                  kms:SigningAlgorithm: "RSASSA_PKCS1_V1_5_SHA_256"
