name: deploy to staging
on:
  push:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      statuses: write
      contents: read
    environment: staging

    steps:
      - name: Check out code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          cache: true
          go-version-file: provider/github-app-token/go.mod
          cache-dependency-path: provider/github-app-token/go.sum

      - name: build
        run: |
          make build
        working-directory: provider

      - uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          aws-region: us-east-1
          role-to-assume: arn:aws:iam::616212855146:role/github-app-token-github-actions-us-east-1

      - name: deploy
        run: |
          make deploy
        working-directory: provider
        env:
          APP_ENV: staging

      - id: generate
        name: Use the action
        uses: ./
        with:
          provider-endpoint: https://8y6823l0x3.execute-api.us-east-1.amazonaws.com
          app-id: "263885"
          repositories: |
            R_kgDOIeornQ
            R_kgDOIevBqQ

      - name: Check out code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: "shogo82148/improved-lamp"
          path: improved-lamp
          token: ${{ steps.generate.outputs.token }}
