name: deploy to staging
on:
  push:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      statuses: write
      contents: read
    environment: staging

    steps:
      - name: Check out code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          cache: true
          go-version-file: provider/github-app-token/go.mod
          cache-dependency-path: provider/github-app-token/go.sum

      - name: build
        run: |
          make build
        working-directory: provider

      - uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          aws-region: us-east-1
          role-to-assume: arn:aws:iam::616212855146:role/github-app-token-github-actions-us-east-1

      - name: deploy
        run: |
          make deploy
        working-directory: provider
        env:
          APP_ENV: staging

      - id: generate
        name: Use the action
        uses: ./
        with:
          provider-endpoint: https://8y6823l0x3.execute-api.us-east-1.amazonaws.com
          app-id: "263885"
          repositories: |
            R_kgDOIeornQ
            R_kgDOIevBqQ

      - name: Check out code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: "shogo82148/improved-lamp"
          path: improved-lamp
          token: ${{ steps.generate.outputs.token }}
